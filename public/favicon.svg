<svg viewBox="25 40 60 55" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fav-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="25%" stop-color="#FDE68A" />
      <stop offset="50%" stop-color="#FBBF24" />
      <stop offset="80%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>
    <linearGradient id="fav-gold-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97706" />
      <stop offset="50%" stop-color="#92400E" />
      <stop offset="100%" stop-color="#451A03" />
    </linearGradient>
    <linearGradient id="fav-shaft-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400E" />
