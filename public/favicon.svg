        <rect x="-6" y="-3.5" width="6" height="7" rx="1.5" fill="url(#fav-gold)" />
        <rect x="-29" y="-4.5" width="3" height="9" rx="0.8" fill="url(#fav-gold)" />
        <rect x="-39" y="-11" width="11" height="22" rx="2" fill="url(#fav-gold)" />
        <rect x="-41" y="-13.5" width="15" height="2.5" rx="0.8" fill="url(#fav-gold)" />
